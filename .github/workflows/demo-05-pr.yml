name: Demo 05 - Pull Request

on:
  pull_request:
    branches: 
      - main

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  build-test-branch:
    name: "Build and Test Of PR"
    runs-on: ubuntu-latest
    steps:
    # - name: Make PR Fail
    #   run: exit 1

    - uses: actions/checkout@v5
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x
    
    - name: Install dependencies
      run: dotnet restore "${{ github.workspace }}/mywebapp/mywebapp.sln"
    
    - name: Build
      run: dotnet build "${{ github.workspace }}/mywebapp/mywebapp.sln" --configuration Release --no-restore
    
    - name: Test
      run: |
        dotnet test "${{ github.workspace }}/mywebapp/mywebapp.sln" --no-restore --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Test Report
      uses: dorny/test-reporter@v3
      if: ${{ !cancelled() }}
      continue-on-error: true
      with:
        name: XUnit Tests
        path: ${{ github.workspace }}/mywebapp/tests/TestResults/*.trx
        reporter: dotnet-trx
      
    - name: Publish
      run: dotnet publish "./mywebapp/src/mywebapp.csproj" -c Release -o "./mywebapp_publish"

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mywebappbuildartifacts
        path: ./mywebapp_publish/**
        if-no-files-found: error
        retention-days: 90
